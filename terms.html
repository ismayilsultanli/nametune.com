<p>يجب عليك تسجيل الدخول باستخدام حساب Google أو Facebook أو Microsoft. أنت مسؤول عن الحفاظ على أمان حسابك. يجب عليك تقديم معلومات دقيقة أثناء التسجيل.</p>

<h2>4. الأرصدة والمدفوعات</h2>
<ul>

</ul>

<h2>5. ملكية المحتوى</h2>
<p><strong>محتواك:</strong> تحتفظ بملكية المدخلات الإبداعية التي تقدمها (الأسماء والأوصاف والتفضيلات). المحتوى الصوتي المُنشأ بالذكاء الاصطناعي مرخص لك للاستخدام الشخصي غير التجاري.</p>
<p><strong>الاستخدام التجاري:</strong> إذا كنت ترغب في استخدام المحتوى المُنشأ تجاريًا، اتصل بنا للحصول على ترخيص تجاري.</p>
<p><strong>قسم الاستكشاف:</strong> المحتوى الذي تنشره في قسم الاستكشاف يصبح مرئيًا للعامة. أنت تمنح NameTune ترخيصًا غير حصري لعرض هذا المحتوى داخل التطبيق.</p>

<h2>6. المحتوى والاستخدام المحظور</h2>
<p>توافق على عدم استخدام NameTune من أجل:</p>
<ul>
  <li>إنشاء محتوى يؤله أو يعبد أو يجري مقارنات إلهية مع أي شخص</li>
  <li>إنشاء محتوى يحض على الكراهية أو التمييز أو التهديد</li>
  <li>إنشاء محتوى ينتهك حقوق الملكية الفكرية للآخرين</li>
  <li>انتحال شخصية أفراد آخرين أو تحريف هويتك</li>
  <li>محاولة الهندسة العكسية أو اختراق أو تعطيل الخدمة</li>
  <li>استخدام الخدمة للبريد العشوائي أو الاحتيال أو أي غرض غير قانوني</li>
  <li>التحايل على حدود المعدل أو إساءة استخدام نظام الإنشاء</li>
</ul>
<p>نحتفظ بالحق في إزالة المحتوى وتعليق الحسابات التي تنتهك هذه الإرشادات.</p>

<h2>7. إخلاء المسؤولية عن محتوى الذكاء الاصطناعي</h2>
<p>المحتوى الذي ينشئه NameTune يتم إنشاؤه بواسطة الذكاء الاصطناعي. على الرغم من تطبيق فلاتر الإشراف على المحتوى، لا يمكننا ضمان أن جميع المحتوى المُنشأ سيكون خاليًا من الأخطاء أو المواد غير الملائمة.</p>

<h2>8. توفر الخدمة</h2>
<p>نسعى للحفاظ على توفر عالٍ لكننا لا نضمن خدمة دون انقطاع. قد نعلق الخدمة مؤقتًا للصيانة أو التحديثات أو لظروف خارجة عن سيطرتنا.</p>

<h2>9. تحديد المسؤولية</h2>
<p>يتم تقديم NameTune "كما هو" دون أي ضمانات. إلى أقصى حد يسمح به القانون، لن نكون مسؤولين عن أي أضرار غير مباشرة أو عرضية أو خاصة أو تبعية.</p>

const FLAGS = {en:'gb',az:'az',tr:'tr',ru:'ru',de:'de',es:'es',fr:'fr',ar:'sa'};

function setLang(lang) {
  const t = T[lang] || T.en;
  document.getElementById('content').innerHTML = '<h1>'+t.title+'</h1><p class="date">'+t.date+'</p>'+t.content;
  document.getElementById('footer').innerHTML = t.footer;
  document.getElementById('langFlag').src = 'https://flagcdn.com/w40/'+FLAGS[lang]+'.png';
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.title = t.title + ' — NameTune';
  document.querySelectorAll('.lang-option').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  localStorage.setItem('nt_lang', lang);
}

const langBtn = document.getElementById('langBtn');
const langDrop = document.getElementById('langDropdown');
langBtn.addEventListener('click', () => { langDrop.classList.toggle('show'); langBtn.classList.toggle('open'); });
document.addEventListener('click', e => { if (!e.target.closest('.lang-select')) { langDrop.classList.remove('show'); langBtn.classList.remove('open'); } });
document.querySelectorAll('.lang-option').forEach(b => b.addEventListener('click', () => {
  setLang(b.dataset.lang);
  langDrop.classList.remove('show'); langBtn.classList.remove('open');
}));

const saved = localStorage.getItem('nt_lang') || (navigator.language||'').slice(0,2);
setLang(T[saved] ? saved : 'en');
</script>

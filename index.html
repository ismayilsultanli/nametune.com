<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NameTune — Coming Soon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #060611;
      color: #EAEAF0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 500px at 30% 30%, rgba(123,79,224,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 70% 60%, rgba(232,67,110,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 80%, rgba(62,207,207,0.05) 0%, transparent 70%);
      animation: mesh-rotate 40s linear infinite;
    }

    @keyframes mesh-rotate {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content {
      position: relative; z-index: 1;
      padding: 24px;
      animation: fade-up 1s ease both;
    }

    .logo-icon {
      width: 80px; height: 80px; border-radius: 22px;
      background: linear-gradient(135deg, #7B4FE0, #E8436E);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; margin: 0 auto 32px;
      box-shadow: 0 8px 40px rgba(123,79,224,0.35);
      animation: float 4s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(135deg, #7B4FE0, #E8436E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(15px, 2.5vw, 18px);
      color: #8888A0;
      max-width: 440px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 100px;
      background: rgba(123,79,224,0.08);
      border: 1px solid rgba(123,79,224,0.15);
      font-size: 14px; font-weight: 600;
      color: #9B7AEA;
      animation: pulse 3s ease-in-out infinite;
    }

    .badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #E8436E;
      animation: pulse 2s ease-in-out infinite;
    }

    .notes {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .note {
      position: absolute; font-size: 24px; opacity: 0.08;
      animation: float 6s ease-in-out infinite;
    }
    .note:nth-child(1) { top: 12%; left: 8%; animation-delay: 0s; animation-duration: 7s; }
    .note:nth-child(2) { top: 20%; right: 10%; animation-delay: 1.5s; animation-duration: 5s; font-size: 32px; }
    .note:nth-child(3) { bottom: 25%; left: 12%; animation-delay: 2s; animation-duration: 8s; }
    .note:nth-child(4) { top: 50%; right: 15%; animation-delay: 3s; animation-duration: 6s; font-size: 20px; }
    .note:nth-child(5) { bottom: 15%; right: 8%; animation-delay: 1s; animation-duration: 9s; font-size: 28px; }
    .note:nth-child(6) { top: 70%; left: 6%; animation-delay: 4s; animation-duration: 7s; }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px; text-align: center;
      font-size: 12px; color: rgba(136,136,160,0.4);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="notes">
    <span class="note">🎵</span>
    <span class="note">🎶</span>
    <span class="note">🎵</span>
    <span class="note">🎶</span>
    <span class="note">🎵</span>
    <span class="note">🎶</span>
  </div>

  <div class="content">
    <div class="logo-icon">🎵</div>
    <h1>Something <span>amazing</span><br>is coming</h1>
    <p class="subtitle">Personalized AI music & audio, crafted just for you. We're putting the finishing touches on something special.</p>
    <div class="badge">
      <span class="dot"></span>
      Under Construction
    </div>
  </div>

  <footer>&copy; 2026 NameTune</footer>
</body>
</html>
